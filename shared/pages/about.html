<body>
    <main class="content-section">
        <h1>About Toolbox</h1>
        <p>Toolbox는 개발자와 디자이너, 그리고 일반 사용자들이 일상적인 디지털 작업에서 겪는 불편함을 해결하기 위해 만들어진 유틸리티 플랫폼입니다.</p>
        <p>복잡한 설치 과정 없이 웹 브라우저만으로 이미지 편집, 시트 변환, 확장자 관리 등 다양한 기능을 빠르고 안전하게 이용할 수 있도록 돕는 것이 우리의 목표입니다.</p>
        <p>이 플랫폼에 포함된 모든 도구는 제작자가 직접 필요성을 느껴 개발되었으며, 앞으로도 더 많은 유용한 도구들이 추가될 예정입니다.</p>
    </main>
