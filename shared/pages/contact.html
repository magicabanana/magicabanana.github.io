<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Toolbox</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9798417547330463"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="../js/layout.js" defer></script>
    <style>
        .content-section {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }
        .contact-item {
            margin-bottom: 20px;
        }
        .label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .value {
            font-size: 1.2rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <main class="content-section">
        <h1>Contact Us</h1>
        <div class="contact-card">
            <div class="contact-item">
                <span class="label">Developer</span>
                <span class="value">Park Jae-shin (박재신)</span>
            </div>
            <div class="contact-item">
                <span class="label">Email</span>
                <span class="value">parkj@example.com</span>
            </div>
            <p style="margin-top: 30px; color: var(--text-secondary);">도구 제안이나 버그 제보, 협업 문의는 언제든 환영합니다.</p>
        </div>
    </main>
</body>
</html>
