<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <meta name="description" content="내가 불편해서 만든 웹페이지들.">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9798417547330463"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <nav class="top-nav">
        <a href="#" class="logo">Toolbox.</a>
        <button id="lang-toggle" class="lang-btn">EN</button>
    </nav>

    <header>
        <h1 data-ko="PNG, 스프라이트 편집기." data-en="Web Editor Collection for Image Tools">제한 없는, 포토샵에 없는 기능들.</h1>
        <p data-ko="내가 불편해서 만든 웹페이지들." data-en="Web pages I made because I was uncomfortable.">내가 불편해서 만든 웹페이지들.</p>
    </header>

    <main class="container">
        <div class="grid" id="tools-grid">
            <!-- Tools will be dynamically injected here -->
            <div class="loading-state">
                <p>Loading tools...</p>
            </div>
        </div>
    </main>

    <script src="shared/js/layout.js" defer></script>
    <script src="config/tools.js"></script>
    <script src="script.js"></script>
</body>

</html>
